services:

  postgres:
    image: postgres:16
    container_name: coc-postgres
    environment:
      POSTGRES_DB: coc_dashboard
      POSTGRES_USER: coc_user
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: coc-redis
    ports:
      - "6379:6379"

  coc-app:
    build: .
    container_name: coc-app
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://coc-postgres:5432/coc_dashboard
      - SPRING_DATASOURCE_USERNAME=coc_user
      - DB_PASSWORD=${DB_PASSWORD}
      - SPRING_DATA_REDIS_HOST=coc-redis
      - COC_API_TOKEN=${COC_API_TOKEN}
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      - postgres
      - redis

volumes:
  postgres_data: